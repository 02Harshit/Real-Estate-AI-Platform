name: Build and Push Docker Images

# This tells GitHub to run this script whenever you push code to the 'main' branch
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    # This is the free 7GB RAM server GitHub gives you!
    runs-on: ubuntu-latest 

    steps:
      # Step A: Download your code onto the GitHub server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Log in to Docker Hub using the secrets you just made
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step C: Build the Backend image and push it
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: . 
          file: devops/docker/backend.Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cert-backend:latest

      # Step D: Build the Frontend image and push it
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: . 
          file: devops/docker/frontend.Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cert-frontend:latest